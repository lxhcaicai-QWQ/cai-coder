version: '3.8'

services:
  cai-coder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cai-coder
    restart: unless-stopped
    environment:
      # OpenAI 配置（请根据实际情况设置）
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
    volumes:
      # 可以挂载配置文件（可选）
      - ./config:/app/config:ro
    networks:
      - cai-coder-network
    ports:
      - "8000:8000"  # 如果需要 Web 服务
    stdin_open: true
    tty: true

networks:
  cai-coder-network:
    driver: bridge